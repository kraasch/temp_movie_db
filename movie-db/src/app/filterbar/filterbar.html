
  <div class="drawer">
    <input
      id="my-drawer-1"
      type="checkbox"
      class="drawer-toggle"
      [checked]="drawerOpen"
      (change)="drawerOpen = $any($event.target).checked"
    />
    <div class="drawer-content">

      <!-- Page content here
        <label for="my-drawer-1" class="btn drawer-button">Filter</label>
      -->
      <app-topnav (newItemEvent)="showFilterBar($event)" />
      <div class="mybox">
      @for (item of filteredItems; track item.id) {
      <app-tile
        class="myitem"
        title="{{item.title}}"
        year="{{item.yr}}"
        watched="{{item.watched}}"
        culture="{{item.culture}}"
        desc="{{item.description}}"
        image="{{item.img}}"
        rating="{{item.rating}}"
        imdb="{{item.imdb}}"
      >
      </app-tile>
      }
      </div>
      <app-botfooter />
      <app-cookiebar />
      <!-- Page content end -->

    </div>
    <div class="drawer-side">
      <label for="my-drawer-1" aria-label="close sidebar" class="drawer-overlay"></label>
      <ul class="menu bg-base-200 min-h-full w-80 p-4">

        <!-- Sidebar content here -->
        <div class="divider divider-secondary">Search</div>
        <li>
          <form [formGroup]="myfilters">
          <input formControlName="searchName" type="text" placeholder="Type here" class="input" />
          </form>
        </li>

        <div class="divider divider-secondary">Culture</div>
        <form class="my-padded-tags-form">
          <input class="btn btn-square" type="reset" value="×" (click)="resetFilters()"/>
          <input #jpCheck (change)="updateCultureTags('jp', jpCheck.checked)" aria-label="Japan"   class="btn" type="checkbox" name="frameworks" />
          <input #deCheck (change)="updateCultureTags('de', deCheck.checked)" aria-label="Germany" class="btn" type="checkbox" name="frameworks" />
          <input #usCheck (change)="updateCultureTags('us', usCheck.checked)" aria-label="USA"     class="btn" type="checkbox" name="frameworks" />
          <input #itCheck (change)="updateCultureTags('it', itCheck.checked)" aria-label="Italy"   class="btn" type="checkbox" name="frameworks" />
          <input #svCheck (change)="updateCultureTags('sv', svCheck.checked)" aria-label="Sweden"  class="btn" type="checkbox" name="frameworks" />
          <input #koCheck (change)="updateCultureTags('ko', koCheck.checked)" aria-label="Korea"   class="btn" type="checkbox" name="frameworks" />
          <input #frCheck (change)="updateCultureTags('fr', frCheck.checked)" aria-label="France"  class="btn" type="checkbox" name="frameworks" />
          <input #mxCheck (change)="updateCultureTags('mx', mxCheck.checked)" aria-label="Mexico"  class="btn" type="checkbox" name="frameworks" />
        </form>

        <div class="divider divider-secondary">Decades</div>
        <label>Exclude decades:</label>
        <!-- exclude from left -->
        <div class="w-full max-w-xs">
          <input type="range" min="0" max="9" value="0" class="range" step="1"
            [value]="minYear"
            (input)="minYear = +$any($event.target).value"
          />
          <div class="flex justify-between px-2.5 mt-2 text-xs">
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
            <span>|</span>
          </div>
          <div class="flex justify-between px-2.5 mt-2 text-xs">
            <span>40</span>
            <span>50</span>
            <span>60</span>
            <span>70</span>
            <span>80</span>
            <span>90</span>
            <span>00</span>
            <span>10</span>
            <span>20</span>
            <span>30</span>
          </div>
        </div>

        <div class="divider divider-secondary">Rating</div>
        <li>
          <label>Select IMDB rating:</label>
            <div class="rating gap-1">
              <input value="0" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-red-400"    aria-label="01star" />
              <input value="1" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-red-300"    aria-label="02star" />
              <input value="2" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-orange-300" aria-label="03star" />
              <input value="3" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-orange-400" aria-label="04star" />
              <input value="4" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-yellow-400" aria-label="05star" />
              <input value="5" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-yellow-300" aria-label="06star" />
              <input value="6" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-lime-300"   aria-label="07star" />
              <input value="7" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-lime-400"   aria-label="08star" />
              <input value="8" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-green-400"  aria-label="09star" />
              <input value="9" [(ngModel)]="heartRating" type="radio" name="my-heart-rating" class="mask mask-heart bg-blue-500"   aria-label="10star" />
            </div>
        </li>

      </ul>
    </div>
  </div>
